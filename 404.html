<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found | Eco-Sense Intelligence</title>
    
    <!-- Tailwind CSS (from your existing setup) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome (from your existing setup) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts: Plus Jakarta Sans (from your existing setup) -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
    
    <!-- Ambient Background Glows -->
    <div class="absolute top-[-20%] left-[-10%] w-96 h-96 bg-emerald-500/20 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-[-20%] right-[-10%] w-96 h-96 bg-teal-500/20 rounded-full blur-[100px] pointer-events-none"></div>

    <!-- Main Content Container -->
    <div class="relative z-10 text-center px-6 max-w-2xl mx-auto">
        
        <!-- Icon/Logo Area -->
        <div class="mb-8 flex justify-center">
            <div class="h-24 w-24 bg-slate-800/80 backdrop-blur-sm rounded-2xl flex items-center justify-center shadow-lg border border-slate-700/50">
                <!-- Using a satellite dish icon pulsing to simulate scanning/lost connection -->
                <i class="fa-solid fa-satellite-dish text-5xl text-emerald-400 animate-pulse"></i>
            </div>
        </div>
        
        <!-- The 404 Header -->
        <h1 class="text-7xl md:text-9xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-300 mb-2 drop-shadow-sm">
            404
        </h1>
        
        <!-- Subheading -->
        <h2 class="text-3xl md:text-4xl font-bold text-white mb-6 tracking-tight">
            Lost in the Eco-System?
        </h2>
        
        <!-- Description -->
        <p class="text-slate-400 text-lg md:text-xl mb-10 max-w-lg mx-auto leading-relaxed">
            The data coordinates you entered don't exist in our current scan. The page might have been moved, deleted, or you entered an incorrect URL.
        </p>
        
        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
            
            <!-- Primary Button: Back to Home -->
            <!-- Note: href="/" sends them back to your main index.html file -->
            <a href="/" class="group flex items-center gap-3 bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold py-3 px-8 rounded-full transition-all duration-300 shadow-[0_0_20px_rgba(16,185,129,0.3)] hover:shadow-[0_0_30px_rgba(16,185,129,0.5)] transform hover:-translate-y-1 w-full sm:w-auto justify-center">
                <i class="fa-solid fa-house group-hover:scale-110 transition-transform"></i>
                Return to Dashboard
            </a>
            
            <!-- Secondary Button: Go Back to previous page -->
            <button onclick="window.history.back()" class="group flex items-center gap-3 bg-slate-800/80 hover:bg-slate-700 backdrop-blur-sm text-slate-300 font-semibold py-3 px-8 rounded-full transition-all duration-300 border border-slate-700 hover:border-slate-500 w-full sm:w-auto justify-center">
                <i class="fa-solid fa-arrow-left group-hover:-translate-x-1 transition-transform"></i>
                Go Back
            </button>
            
        </div>
    </div>

    <!-- Footer Area -->
    <footer class="absolute bottom-6 w-full text-center text-slate-500 text-sm font-medium tracking-wide z-10">
        &copy; 2024 Pratheek Enterprises. All systems secure.
    </footer>

</body>
</html>
